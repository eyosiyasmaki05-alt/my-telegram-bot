<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Reward Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; color: #333; }
        .header { background: #0088cc; width: 100%; padding: 20px; color: white; text-align: center; border-radius: 0 0 20px 20px; margin-top: -20px; }
        .card { background: white; width: 90%; margin-top: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .balance { font-size: 32px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Reward Dashboard</h2>
    </div>

    <div class="card">
        <div style="color: #888;">Current Balance</div>
        <div class="balance" id="balance">0.00 ETB</div>
        <button class="btn" onclick="inviteFriend()">🔗 Invite Friends</button>
    </div>

    <script>
        // 1. Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // 2. These two lines FIX the "Loading" screen issue
        tg.expand(); 
        tg.ready(); 

        const user = tg.initDataUnsafe.user;
        
        if (user) {
            // Fetch real balance from your Render Python API
            fetch(`/api/user/${user.id}`)
                .then(response => response.json())
                .then(data => {
                    if (data.balance !== undefined) {
                        document.getElementById('balance').innerText = `${data.balance.toFixed(2)} ETB`;
                    }
                })
                .catch(err => console.error("Error:", err));
        }

        function inviteFriend() {
            const botUser = "YOUR_BOT_USERNAME"; // <-- Update this!
            const inviteLink = `https://t.me/${botUser}?start=${user ? user.id : ''}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=Join and earn rewards!`);
        }
    </script>
</body>
</html>
